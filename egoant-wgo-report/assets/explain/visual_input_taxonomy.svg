<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 520" role="img" aria-labelledby="title desc">
  <title id="title">Visual input taxonomy for EgoANT WGO experiments</title>
  <desc id="desc">A taxonomy comparing contact sheets, temporal collages, neighbor sheets, and hand crops.</desc>
  <defs>
    <style>
      .bg{fill:#fffdf8}.ink{fill:#1c1914}.muted{fill:#5c564c}.card{fill:#f7f4ef;stroke:#d9d0c2;stroke-width:1.4}
      .tile{fill:#e8e2d6;stroke:#fffdf8;stroke-width:2}.stamp{fill:#f0c94d}.hand{fill:#c45c26}.focus{fill:#2f6f66}.bad{fill:#bfc7ca}
      .txt{font:16px "IBM Plex Sans",Arial,sans-serif}.mono{font:13px "IBM Plex Mono",monospace}.small{font-size:13px}.label{font-weight:700}
    </style>
  </defs>
  <rect width="1080" height="520" rx="18" class="bg"/>
  <text x="36" y="46" class="txt label ink">Visual inputs are different objects, not synonyms</text>
  <text x="36" y="76" class="txt muted">The ablation names describe what the VLM actually sees.</text>
  <g transform="translate(36,115)">
    <rect width="235" height="320" rx="14" class="card"/>
    <text x="18" y="34" class="txt label ink">Contact sheet</text>
    <text x="18" y="58" class="txt small muted">20 timestamped frames for segmentation</text>
    <g transform="translate(18,86)">
      <rect x="0" y="0" width="38" height="28" class="tile"/><rect x="44" y="0" width="38" height="28" class="tile"/><rect x="88" y="0" width="38" height="28" class="tile"/><rect x="132" y="0" width="38" height="28" class="tile"/>
      <rect x="0" y="34" width="38" height="28" class="tile"/><rect x="44" y="34" width="38" height="28" class="tile"/><rect x="88" y="34" width="38" height="28" class="tile"/><rect x="132" y="34" width="38" height="28" class="tile"/>
      <rect x="0" y="68" width="38" height="28" class="tile"/><rect x="44" y="68" width="38" height="28" class="tile"/><rect x="88" y="68" width="38" height="28" class="tile"/><rect x="132" y="68" width="38" height="28" class="tile"/>
      <rect x="0" y="102" width="38" height="28" class="tile"/><rect x="44" y="102" width="38" height="28" class="tile"/><rect x="88" y="102" width="38" height="28" class="tile"/><rect x="132" y="102" width="38" height="28" class="tile"/>
      <rect x="4" y="4" width="24" height="9" class="stamp"/><rect x="48" y="4" width="24" height="9" class="stamp"/><rect x="92" y="4" width="24" height="9" class="stamp"/>
    </g>
    <text x="18" y="268" class="mono ink">Best for: boundaries</text>
  </g>
  <g transform="translate(295,115)">
    <rect width="235" height="320" rx="14" class="card"/>
    <text x="18" y="34" class="txt label ink">Temporal collage</text>
    <text x="18" y="58" class="txt small muted">past / current / future grids for labels</text>
    <rect x="18" y="94" width="58" height="104" rx="8" class="bad"/><text x="29" y="219" class="mono ink">past</text>
    <rect x="88" y="94" width="58" height="104" rx="8" class="focus"/><text x="91" y="219" class="mono ink">current</text>
    <rect x="158" y="94" width="58" height="104" rx="8" class="bad"/><text x="166" y="219" class="mono ink">future</text>
    <text x="18" y="268" class="mono ink">HomER result: hurt labels</text>
  </g>
  <g transform="translate(554,115)">
    <rect width="235" height="320" rx="14" class="card"/>
    <text x="18" y="34" class="txt label ink">Neighbor sheets</text>
    <text x="18" y="58" class="txt small muted">prev / current / next segment sheets</text>
    <rect x="18" y="100" width="58" height="72" rx="8" class="bad"/><rect x="88" y="100" width="58" height="72" rx="8" class="focus"/><rect x="158" y="100" width="58" height="72" rx="8" class="bad"/>
    <path d="M78 136h8M148 136h8" stroke="#5c564c" stroke-width="2"/>
    <text x="22" y="194" class="mono ink">prev</text><text x="92" y="194" class="mono ink">cur</text><text x="163" y="194" class="mono ink">next</text>
    <text x="18" y="268" class="mono ink">Risk: context pollution</text>
  </g>
  <g transform="translate(813,115)">
    <rect width="235" height="320" rx="14" class="card"/>
    <text x="18" y="34" class="txt label ink">Hand crop</text>
    <text x="18" y="58" class="txt small muted">crop around hands/wrists before labeling</text>
    <rect x="30" y="93" width="174" height="116" rx="10" class="tile"/>
    <circle cx="80" cy="145" r="24" class="hand"/><circle cx="144" cy="145" r="24" class="hand"/>
    <rect x="54" y="116" width="116" height="60" rx="8" fill="none" stroke="#2f6f66" stroke-width="5"/>
    <text x="18" y="268" class="mono ink">Needs reliable hand signal</text>
  </g>
</svg>
