<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Wrist-speed minima segmentation schematic</title>
  <desc id="desc">A schematic explaining how wrist-speed minima can create too many segments when pauses, adjustments, and release motions all look like valleys.</desc>
  <defs>
    <style>
      .bg{fill:#fffdf8}.ink{fill:#1c1914}.muted{fill:#5c564c}.grid{stroke:#e5ddd1;stroke-width:1}.axis{stroke:#b9afa1;stroke-width:2}
      .left{fill:none;stroke:#2f6f66;stroke-width:5}.right{fill:none;stroke:#c45c26;stroke-width:5}
      .cut{stroke:#1c1914;stroke-width:2;stroke-dasharray:6 6}.gold{fill:#f0c94d}.pred{fill:#2f6f66}.bad{fill:#c45c26}
      .txt{font:16px "IBM Plex Sans",Arial,sans-serif}.mono{font:14px "IBM Plex Mono",monospace}.small{font-size:13px}.label{font-weight:700}
    </style>
  </defs>
  <rect width="1120" height="520" rx="18" class="bg"/>
  <text x="42" y="50" class="txt label ink">Production-style wrist-speed cuts: useful signal, but easy to over-segment</text>
  <text x="42" y="80" class="txt muted">Schematic: HaWoR reconstructs wrist tracks; we smooth wrist speed and cut at speed valleys.</text>

  <g transform="translate(88,128)">
    <line x1="0" y1="260" x2="930" y2="260" class="axis"/>
    <line x1="0" y1="0" x2="0" y2="260" class="axis"/>
    <g class="grid">
      <line x1="0" y1="65" x2="930" y2="65"/><line x1="0" y1="130" x2="930" y2="130"/><line x1="0" y1="195" x2="930" y2="195"/>
      <line x1="155" y1="0" x2="155" y2="260"/><line x1="310" y1="0" x2="310" y2="260"/><line x1="465" y1="0" x2="465" y2="260"/><line x1="620" y1="0" x2="620" y2="260"/><line x1="775" y1="0" x2="775" y2="260"/>
    </g>
    <path class="left" d="M0 238 C38 70,85 75,128 226 S214 70,270 228 S370 74,430 218 S525 120,588 234 S710 54,780 226 S875 105,930 205"/>
    <path class="right" d="M0 225 C45 130,84 90,135 210 S220 120,285 220 S385 86,445 232 S520 160,605 218 S716 82,780 238 S878 140,930 215"/>
    <g>
      <line x1="132" y1="0" x2="132" y2="285" class="cut"/><line x1="282" y1="0" x2="282" y2="285" class="cut"/>
      <line x1="448" y1="0" x2="448" y2="285" class="cut"/><line x1="608" y1="0" x2="608" y2="285" class="cut"/>
      <line x1="785" y1="0" x2="785" y2="285" class="cut"/>
    </g>
    <text x="0" y="-14" class="txt small muted">smoothed wrist speed</text>
    <text x="875" y="296" class="txt small muted">time</text>
    <text x="25" y="42" class="txt small ink">left wrist</text>
    <text x="125" y="42" class="txt small" fill="#c45c26">right wrist</text>
  </g>

  <g transform="translate(88,442)">
    <text x="0" y="0" class="txt label ink">Gold intent</text>
    <rect x="120" y="-18" width="700" height="28" rx="6" class="gold"/>
    <text x="420" y="2" class="mono ink">one completed task</text>
    <text x="0" y="48" class="txt label ink">Minima cuts</text>
    <rect x="120" y="30" width="130" height="28" rx="6" class="pred"/>
    <rect x="255" y="30" width="145" height="28" rx="6" class="bad"/>
    <rect x="405" y="30" width="145" height="28" rx="6" class="pred"/>
    <rect x="555" y="30" width="125" height="28" rx="6" class="bad"/>
    <rect x="685" y="30" width="135" height="28" rx="6" class="pred"/>
    <text x="272" y="79" class="txt small muted">pause / adjust / release can become fake boundaries</text>
  </g>
</svg>
